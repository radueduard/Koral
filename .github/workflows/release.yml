name: Release

# Tag-driven: `git tag v0.0.1 && git push --tags` produces a draft release.
# Draft, not published — the artifacts are there for you to download and try before anyone else
# can. workflow_dispatch lets you exercise the whole thing without minting a tag first, which is
# how you should test changes to this file.
on:
  push:
    branches: [master]      # every push to master gets built — it runs on our own machine
    tags: ['v*']            # ...but only a tag drafts an actual release (see the `release` job)
    paths-ignore:
      - '**.md'             # a docs-only push does not need a 20-minute release build
      - 'docs/**'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: write   # required to create the release

# There is exactly one self-hosted Linux runner, so runs execute strictly one at a time. Without
# this, three pushes in quick succession queue three full builds and you wait for all of them.
# Superseding a branch build with the newer commit is almost always what you want.
#
# Tags are exempt: a release build must never be cancelled by whatever lands next.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

jobs:
  # The Linux leg builds inside a pinned container (see docker/linux-release.Dockerfile for why).
  # A job-level `container:` is resolved by pulling, not by looking for a local image, so the image
  # has to exist in a registry before the build job starts — hence this job.
  #
  # It runs on a *hosted* runner on purpose: building the image here means the self-hosted box only
  # ever has to pull and run it, so it needs a working docker daemon but not a build toolchain of
  # its own. Layers are cached in the Actions cache, so an unchanged Dockerfile is a few seconds.
  linux-image:
    name: Linux build image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR rejects uppercase in image names and the owner is not guaranteed to be lowercase.
      - id: meta
        shell: bash
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${owner}/koral-linux-release:latest" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/linux-release.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    needs: linux-image
    # Empty for every leg except linux-x64, which means "no container" — macOS and Windows build
    # directly on their runner as before.
    container: ${{ matrix.name == 'linux-x64' && needs.linux-image.outputs.image || '' }}
    strategy:
      fail-fast: false   # one platform breaking should not hide the other's result
      matrix:
        include:
          - name: linux-x64
            # A self-hosted runner on radue's own box (see docs/self-hosted-runner.md to set one
            # up). Worth it because vcpkg builds openimageio/assimp/slang/validation-layers from
            # source: GitHub's free Linux runner gives 4 vCPU and discards everything afterwards,
            # while the local machine has 32 and keeps a warm cache between runs.
            runner: gfx-linux
            triplet: x64-linux
            # Ninja, not CMake's Linux default of "Unix Makefiles" — which is what this job used
            # until now, silently, while local development used Ninja. Same generator as the dev
            # build is the point: a release should not be the one configuration nobody ever builds.
            generator: Ninja
            # THE ONE THING THAT MUST NOT BE DROPPED FROM THE LINUX LEG.
            #
            # The host is CachyOS: bleeding-edge glibc and, because the cachyos-znver4 repos are
            # enabled, a libstdc++ compiled -march=znver4. Building directly on it produced the
            # v0.0.3 artifact, which required GLIBC_2.43 (so it would not load on any mainstream
            # distro) and carried unguarded AVX-512 inside std::to_chars via stdc++exp (so it would
            # have SIGILL'd on any pre-AVX-512 CPU even if it had loaded).
            #
            # Building inside this container instead pins both: glibc 2.35 and a stock generic-x86
            # GCC 14. See docker/linux-release.Dockerfile for the full reasoning, and the
            # job-level `container:` above for how the image is selected.

          - name: windows-x64
            # GitHub's hosted runner: there is no self-hosted Windows box. The cost is real and
            # worth stating — vcpkg builds openimageio, assimp, slang and the validation layers
            # from source under MSVC on 4 vCPU, so the first run after a dependency bump is close
            # to an hour, and a private repo bills Windows minutes at 2x. Subsequent runs hit the
            # Actions binary cache (see the cache step below, which switches backend on
            # runner.environment) and are much cheaper.
            runner: windows-2022
            # static-md, not the default x64-windows. The default is a *dynamic* triplet, which
            # would make spdlog/fmt/imgui DLLs — and those three are the ones the SDK vendors for
            # consumers, so they must be static archives exactly as they are on Linux, or the
            # vendoring silently ships nothing linkable. "-md" keeps the CRT dynamic (CMake's
            # default), so this is only about vcpkg's own libraries. slang and the Vulkan loader
            # stay DLLs regardless — bundled next to the exe by GET_RUNTIME_DEPENDENCIES.
            triplet: x64-windows-static-md
            # Deliberately NOT Ninja. Ninja on Windows needs cl.exe on PATH, which means running
            # vcvars first (an extra action); the Visual Studio generator finds the toolchain by
            # itself. Also already the default on windows-2022 — spelled out so the generator is
            # stated rather than inherited.
            generator: Visual Studio 17 2022

          - name: macos-arm64
            # Self-hosted on radue's own Mac (see docs/self-hosted-runner.md) — same reasoning as
            # linux-x64: vcpkg builds openimageio/assimp/slang/validation-layers from source, and
            # a disposable hosted macOS runner is both slow (cold cache every run) and billed at a
            # steep multiplier since this repo is private.
            #
            # Previously blocked here on std::stacktrace: used in the public builder.h, but
            # Apple's libc++ does not ship <stacktrace> at all. Fixed by kor::Stacktrace
            # (include/stacktrace.h), which falls back to backtrace_symbols(3) when the standard
            # header is unavailable. A second, unrelated snag on the way here: assimp vendors its
            # own copy of miniz.h (via kubazip), whose mz_* symbols collide with minizip-ng
            # (pulled in transitively via OpenColorIO) — a hard duplicate-symbol error on Apple's
            # linker. Fixed with the vcpkg-overlay-ports/kubazip overlay, which renames kubazip's
            # vendored mz_* namespace at build time.
            #
            # The OpenGL backend still compiles and ships here, but is not fully functional: macOS
            # caps at GL 4.1, so no compute shaders and no bindless. Vulkan-via-MoltenVK is the
            # only backend to rely on for macOS builds.
            runner: gfx-macos
            triplet: arm64-osx
            generator: Ninja

          # Not yet built, deliberately:
          #
          # arm64 (Linux/Windows) — GitHub's hosted ARM runners (ubuntu-24.04-arm,
          #   windows-11-arm) are free only for *public* repositories; this repo is private, so
          #   they bill as larger runners. Adding them is two lines here (name/os/triplet:
          #   arm64-linux, arm64-windows) once that changes — but vcpkg resolving shader-slang,
          #   openimageio, assimp and ktx for an arm64 triplet is unverified, so expect that to be
          #   the real work, not the YAML.

    steps:
      - uses: actions/checkout@v4

      # GLFW/GLEW/the Vulkan loader need the X11 and Wayland development headers to build from
      # source. They are not on the runner image, and vcpkg's error when they are missing names the
      # header, not the package, so it is worth being explicit here.
      #
      # Hosted runners only: this is apt, and a self-hosted runner is not necessarily Debian (the
      # one this repo uses is Arch). A self-hosted machine is expected to have these already — it is
      # a machine the project is developed on. If vcpkg fails there complaining about a missing
      # header, install the distro's equivalent of the package below and it is a one-time fix, not a
      # per-run cost. See docs/self-hosted-runner.md.
      - name: Install X11/Wayland development packages
        if: runner.os == 'Linux' && runner.environment == 'github-hosted'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libxext-dev libxfixes-dev libxrender-dev libxkbcommon-dev \
            libwayland-dev wayland-protocols libgl1-mesa-dev libglu1-mesa-dev \
            libltdl-dev nasm

      # There is no vcpkg port for MoltenVK (it has never existed in the registry), so it is not
      # something the vcpkg install step below can restore from cache — CMakeLists.txt shells out
      # to `brew --prefix molten-vk` at configure time and bundles the dylib + ICD manifest it
      # finds there. Idempotent: a no-op in a few seconds if the self-hosted runner already has it.
      - name: Install MoltenVK (Homebrew)
        if: runner.os == 'macOS'
        run: brew install molten-vk

      # vcpkg builds openimageio, assimp, slang and the validation layers from source — the better
      # part of an hour. The x-gha binary-cache backend needs these two variables, which are in the
      # runner's environment but not exported to steps by default. Hosted runners only.
      - name: Enable vcpkg binary caching
        if: runner.environment == 'github-hosted'
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # Where vcpkg looks for prebuilt packages, and the difference between a 1-minute Configure and
      # a 9-minute one.
      #
      # This used to say "clear;default,readwrite" — meaning "the default files cache", which the
      # docs place at ~/.cache/vcpkg/archives. It did not go there. run-vcpkg exports its own
      # VCPKG_DEFAULT_BINARY_CACHE pointing at a per-run directory *inside the workspace*
      # (<workspace>/<uuid>/vcpkg_cache), and `default` means "whatever that variable says". So the
      # cache was empty on arrival and deleted on exit, and every single run rebuilt all 64 ports
      # from source while cheerfully logging "Restored 0 package(s)".
      #
      # `files` cannot be hijacked that way: it takes a mandatory absolute path, so the location is
      # stated here rather than inherited from whatever the action decided. On the self-hosted
      # runner that path is the *same* cache local builds populate, since the runner runs as radue —
      # a dependency you have already built at your desk never gets built again in CI.
      #
      # Set from a step, not the job's `env:`, because a job-level `env:` would override this on
      # every subsequent step and put us right back where we started.
      # The path deliberately lives under the runner's *tool cache* rather than $HOME. $HOME was
      # fine while the Linux job ran directly on the host, but the job now runs inside a container
      # where $HOME is the container's /root and evaporates with it. The tool cache is one of the
      # few directories the runner bind-mounts into a container job (as /__t) and keeps between
      # runs, so the same path works whether or not there is a container — which is why vcpkg
      # itself is already installed there.
      - name: Point vcpkg at a binary cache that survives the run
        shell: bash
        run: |
          if [ "${{ runner.environment }}" = "self-hosted" ]; then
            cache="${RUNNER_TOOL_CACHE}/vcpkg-cache"
            mkdir -p "$cache"
            echo "VCPKG_BINARY_SOURCES=clear;files,$cache,readwrite" >> "$GITHUB_ENV"
            echo "binary cache: $cache ($(du -sh "$cache" 2>/dev/null | cut -f1) already there)"
          else
            echo "VCPKG_BINARY_SOURCES=clear;x-gha,readwrite" >> "$GITHUB_ENV"
            echo "binary cache: GitHub Actions cache (runner is disposable)"
          fi

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          # This must be the vcpkg checkout the manifest was written against — NOT the
          # builtin-baseline in vcpkg.json, which is older (2026-02-27) and was the first thing to
          # break CI. The two do different jobs: builtin-baseline picks the *default version* for
          # ports with no constraint, while the checkout supplies the versions/ *database* that
          # says which versions exist at all. vcpkg.json asks for jasper >= 4.2.9, which only
          # appears in a database newer than the baseline — hence "no version database entry for
          # jasper at 4.2.9" when CI was pinned to the baseline commit.
          #
          # Keep this in step with the local checkout (~/.vcpkg-clion/vcpkg) when bumping deps.
          vcpkgGitCommitId: b216ddff25a1f432870e6c340ce79357049ef86e   # 2026-06-12

          # Keep vcpkg *outside* the workspace. The default is <workspace>/vcpkg, which
          # actions/checkout deletes at the start of every run (git clean -ffdx), so each run
          # re-cloned the full vcpkg repo and re-bootstrapped the tool. The tool cache is not
          # cleaned, so this survives: run-vcpkg compares the commit id against the one it recorded
          # and does nothing at all when it matches. Bump vcpkgGitCommitId above and it re-fetches
          # and re-bootstraps by itself — nothing here needs to be cleared by hand.
          vcpkgDirectory: ${{ runner.tool_cache }}/vcpkg

      - name: Configure
        shell: bash
        run: |
          # actions/checkout wipes the workspace (git clean -ffdx) at the start of every run, so the
          # build tree never survives and every source file is recompiled from scratch. vcpkg does
          # not care — it restores from its own cache in seconds — but our own sources do.
          #
          # ccache fixes that without giving up a clean tree: it is keyed on preprocessed source, so
          # an unchanged translation unit is a cache hit no matter which directory it was compiled
          # in. Optional — if ccache is not installed, this is simply a full rebuild, not an error.
          launcher=()
          if command -v ccache >/dev/null 2>&1; then
            launcher=(-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache)
            echo "ccache: $(ccache --version | head -1)"
          else
            echo "ccache: not installed — full rebuild (pacman -S ccache to speed this up)"
          fi

          cmake -S . -B build \
            -G "${{ matrix.generator }}" \
            "${launcher[@]}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_INSTALL_PREFIX="$PWD/stage" \
            -DKORAL_BUILD_TESTS=OFF \
            -DKORAL_EMBED_SOURCE_PATHS=OFF
        # KORAL_EMBED_SOURCE_PATHS=OFF is the one flag that must never be dropped from a release
        # build. With it ON, the shipped binary keeps this runner's source path as a fallback for
        # locating shaders and assets — an absolute path that names nothing on a user's machine.
        # See src/core/paths.cpp.

      - name: Build
        run: cmake --build build --config Release -j

      - name: Install
        run: cmake --install build --config Release

      # Two archives from one install tree. They overlap (the SDK needs the library the runtime
      # ships), which is fine and much simpler than trying to split them.
      - name: Package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          [ "$GITHUB_REF_TYPE" = tag ] || version="dev-${GITHUB_SHA::7}"
          mkdir -p dist
          # Later steps need the same string; recomputing it there would be a second place to get
          # the tag-vs-branch rule wrong.
          echo "KORAL_VERSION=$version" >> "$GITHUB_ENV"

          # Runtime: what you double-click. Executable, the library, its bundled deps, and the
          # shaders/assets it loads at startup.
          runtime="koral-runtime-${version}-${{ matrix.name }}"
          mkdir -p "$runtime"
          cp -r stage/bin "$runtime/"
          cp -r stage/lib "$runtime/"
          cp -r stage/share "$runtime/"
          rm -rf "$runtime/lib/cmake" "$runtime/lib/koral-vendor"   # SDK-only, dead weight here

          # Linux only: ship the C++ runtime alongside the binary.
          #
          # The container builds with GCC 14, so the library needs GLIBCXX_3.4.33. glibc 2.35 is
          # old enough for Ubuntu 22.04 — but that distro's *system* libstdc++ comes from GCC 12
          # and only goes up to GLIBCXX_3.4.30, so without this the runtime archive would still
          # refuse to start there for the C++ runtime rather than for libc. Bundling closes the
          # gap; the binaries already resolve $ORIGIN/../lib first, which is how the Vulkan loader
          # and slang get picked up.
          #
          # Only the runtime archive gets this. The SDK deliberately does not: anyone compiling
          # against Koral needs a C++23 compiler anyway, so their libstdc++ is already new enough,
          # and dropping ours into their link line would be an ODR hazard rather than a service.
          if [ "${{ runner.os }}" = "Linux" ]; then
            for lib in libstdc++.so.6 libgcc_s.so.1; do
              src=$(g++ -print-file-name=$lib)
              if [ -f "$src" ]; then
                cp -L "$src" "$runtime/lib/"
                echo "bundled $lib from $src"
              else
                echo "WARNING: $lib not found; runtime archive may not start on older distros"
              fi
            done
          fi

          # SDK: what you build against. Everything, including the headers, the CMake package and
          # the vendored public dependencies (glm/spdlog/imgui) so a project needs no package
          # manager of its own.
          sdk="koral-sdk-${version}-${{ matrix.name }}"
          cp -r stage "$sdk"

          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a -tzip "dist/${runtime}.zip" "./${runtime}/*"
            7z a -tzip "dist/${sdk}.zip"     "./${sdk}/*"
          else
            tar czf "dist/${runtime}.tar.gz" "$runtime"
            tar czf "dist/${sdk}.tar.gz"     "$sdk"
          fi
          ls -la dist

      # Catches the failure mode that produced an unusable v0.0.3: an artifact that is fine on the
      # machine that built it and refuses to load, or dies with SIGILL, on the hardware this
      # release actually targets. Neither shows up in a build log, so it is asserted here.
      #
      # The floor is 2.35 to match the container's Ubuntu 22.04 base — if the container base is
      # ever bumped, this number moves with it, and that should be a deliberate decision rather
      # than something noticed by a user.
      - name: Verify the Linux artifact's portability floor
        if: runner.os == 'Linux'
        shell: bash
        run: |
          chmod +x scripts/check-linux-portability.sh
          ./scripts/check-linux-portability.sh "koral-runtime-${KORAL_VERSION}-${{ matrix.name }}" 2.35

      # Proves the archive is usable *before* anyone downloads it: configure and link a project
      # against the packaged SDK with no vcpkg and no toolchain file, exactly as a launcher-
      # generated project would. This is what catches an unshipped header or an unbundled .so —
      # both of which this package has already had.
      - name: Verify the SDK links standalone
        shell: bash
        run: |
          mkdir -p consumercheck && cd consumercheck
          cat > CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.28)
          project(consumercheck CXX)
          set(CMAKE_CXX_STANDARD 23)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          find_package(Koral REQUIRED)
          add_executable(consumercheck main.cpp)
          target_link_libraries(consumercheck PRIVATE Koral::Koral)
          EOF
          # Touches every third-party type that leaks through Koral's public headers.
          cat > main.cpp <<'EOF'
          #include <cstdio>
          #include "context.h"
          #include "log.h"
          #include "gui.h"
          #include "structs.h"
          int main() {
              kor::log::info("ok");
              const glm::vec3 v{1.f, 2.f, 3.f};
              const ImVec2 p{4.f, 5.f};
              std::printf("%.1f %.1f %s\n", v.x, p.y,
                          kor::shaderPath("doubleValues.comp.glsl").string().c_str());
              return 0;
          }
          EOF
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PWD/../stage"
          cmake --build build --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*

  release:
    name: Draft release
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          draft: true          # you publish it, once you have tried the binaries
          generate_release_notes: true
          files: dist/*
